name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        description: "[DEPRECATED] No longer has any effect"
        default: "3"
permissions:
  contents: write
  issues: read
  pull-requests: read
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1.25.7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
